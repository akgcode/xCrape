services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: xcrape
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: xcrape
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xcrape"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
